<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GameZone - Site de Jogos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #0f0c29, #302b63, #24243e);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: rgba(0,0,0,0.5);
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 40px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      background: #00c6ff;
      color: black;
      margin-top: 10px;
    }

    button:hover {
      background: #0072ff;
      color: white;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      background: rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

<header>
  🎮 GameZone - Seu Site de Jogos
</header>

<div class="container">

  <div class="card">
    <h2>Mini Jogo: Clique Rápido</h2>
    <p>Pontos: <span id="score">0</span></p>
    <button onclick="addPoint()">Clique aqui!</button>
  </div>

  <div class="card">
    <h2>Sobre o site</h2>
    <p>Este é um site simples de jogos criado com HTML, CSS e JavaScript.</p>
  </div>

</div>

<footer>
  © 2026 GameZone - Todos os direitos reservados
</footer>

<script>
  let score = 0;

  function addPoint() {
    score++;
    document.getElementById("score").innerText = score;
  }
</script>

</body>
</html>
