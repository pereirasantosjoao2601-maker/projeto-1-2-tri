<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LevelUp Hub - Game News</title>

<style>
/* Configurações Globais e Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

/* Efeito de rolagem suave ao clicar no menu */
html {
    scroll-behavior: smooth;
}

body {
    background: #0b0f1a;
    color: #fff;
}

/* Cabeçalho / Menu de Navegação */
header {
    background: #111827;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #7c3aed;
    position: sticky;
    top: 0;
    z-index: 100;
}

header h1 {
    color: #7c3aed;
    font-size: 24px;
}

nav a {
    color: #fff;
    margin-left: 15px;
    text-decoration: none;
    transition: 0.3s;
    font-weight: 500;
}

nav a:hover {
    color: #7c3aed;
}

/* Seção Hero (Banner Principal) */
.hero {
    padding: 80px 20px;
    text-align: center;
    background: linear-gradient(135deg, #111827, #1f2937);
}

.hero h2 {
    font-size: 38px;
    margin-bottom: 10px;
}

.hero p {
    color: #cbd5e1;
}

/* Container de Conteúdo */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

.section {
    padding: 40px 0;
}

.section h3 {
    margin-bottom: 20px;
    color: #7c3aed;
    font-size: 22px;
}

/* Grid e Cards de Notícias/Reviews */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #1f2937;
    transition: 0.3s;
    cursor: pointer; /* Transforma a seta do mouse na mãozinha de clique */
    position: relative;
}

/* Efeito visual ao passar o mouse no card */
.card:hover {
    transform: translateY(-5px);
    border-color: #7c3aed;
    box-shadow: 0 5px 15px rgba(124, 58, 237, 0.2);
}

.card h4 {
    margin-bottom: 10px;
    color: #fff;
    font-size: 18px;
}

.card p {
    color: #cbd5e1;
    font-size: 14px;
    line-height: 1.5;
}

/* Rodapé */
footer {
    text-align: center;
    padding: 25px;
    border-top: 1px solid #1f2937;
    color: #94a3b8;
    margin-top: 40px;
    background: #111827;
}

/* Ajuste Responsivo para Celulares */
@media (max-width: 600px) {
    header {
        flex-direction: column;
        gap: 15px;
    }
    nav a {
        margin: 0 10px;
    }
}
</style>
</head>

<body>

<header>
    <h1>LevelUp Hub 🎮</h1>
    <nav>
        <a href="#">Início</a>
        <a href="#noticias">Notícias</a>
        <a href="#reviews">Reviews</a>
        <a href="#contato">Contato</a>
    </nav>
</header>

<section class="hero">
    <h2>Bem-vindo ao LevelUp Hub</h2>
    <p>Seu portal de notícias, reviews e rankings do mundo dos games</p>
</section>

<div class="container">

    <section id="noticias" class="section">
        <h3>🔥 Últimas Notícias</h3>
        <div class="grid">
            <div class="card">
                <h4>Novo update em jogos populares</h4>
                <p>Veja as novidades mais recentes do mundo dos games.</p>
            </div>
            <div class="card">
                <h4>Evento de eSports anunciado</h4>
                <p>Grandesdano o cuebaq
